<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nook — a small place to post</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ============ AUTH SCREEN ============ -->
<div id="auth-screen" class="auth-screen">
  <div class="auth-card">
    <div class="brand">
      <span class="brand-mark">N</span>
      <h1>Nook</h1>
    </div>
    <p class="brand-tag">a small place to post, follow, and reply.</p>

    <div class="auth-tabs">
      <button class="auth-tab active" data-tab="login">Log in</button>
      <button class="auth-tab" data-tab="register">Create account</button>
    </div>

    <form id="login-form" class="auth-form">
      <label>Username or email
        <input type="text" id="login-username" required autocomplete="username">
      </label>
      <label>Password
        <input type="password" id="login-password" required autocomplete="current-password">
      </label>
      <p class="form-error" id="login-error"></p>
      <button type="submit" class="btn btn-primary btn-block">Log in</button>
    </form>

    <form id="register-form" class="auth-form hidden">
      <label>Username
        <input type="text" id="register-username" required minlength="3" autocomplete="username">
      </label>
      <label>Email
        <input type="email" id="register-email" required autocomplete="email">
      </label>
      <label>Password
        <input type="password" id="register-password" required minlength="6" autocomplete="new-password">
      </label>
      <p class="form-error" id="register-error"></p>
      <button type="submit" class="btn btn-primary btn-block">Create account</button>
    </form>
  </div>
</div>

<!-- ============ APP SHELL ============ -->
<div id="app" class="app hidden">

  <aside class="sidebar">
    <div class="brand brand-small">
      <span class="brand-mark">N</span>
      <h1>Nook</h1>
    </div>

    <nav class="nav">
      <button class="nav-item active" data-view="feed">Feed</button>
      <button class="nav-item" data-view="everyone">Everyone</button>
      <button class="nav-item" data-view="profile">My profile</button>
    </nav>

    <div class="composer">
      <p class="eyebrow">New entry</p>
      <textarea id="composer-input" maxlength="2000" placeholder="What's on your mind?"></textarea>
      <div class="composer-row">
        <span class="char-count" id="char-count">2000 left</span>
        <button class="btn btn-primary" id="composer-submit">Post</button>
      </div>
    </div>

    <button class="btn btn-ghost btn-block" id="logout-btn">Log out</button>
  </aside>

  <main class="main">
    <header class="main-header">
      <h2 id="main-title">Your feed</h2>
      <div class="search-box">
        <input type="text" id="user-search" placeholder="Find people…">
      </div>
    </header>

    <div id="search-results" class="search-results hidden"></div>

    <section id="feed-view" class="view">
      <div id="feed-list" class="post-list"></div>
    </section>

    <section id="profile-view" class="view hidden">
      <div id="profile-header" class="profile-header"></div>
      <div class="profile-tabs">
        <button class="profile-tab active" data-ptab="posts">Entries</button>
        <button class="profile-tab" data-ptab="followers">Followers</button>
        <button class="profile-tab" data-ptab="following">Following</button>
      </div>
      <div id="profile-posts" class="post-list"></div>
      <div id="profile-followers" class="user-list hidden"></div>
      <div id="profile-following" class="user-list hidden"></div>
    </section>
  </main>
</div>

<!-- Comment drawer -->
<div id="comment-overlay" class="overlay hidden">
  <div class="drawer">
    <div class="drawer-header">
      <p class="eyebrow">Entry</p>
      <button id="close-drawer" class="btn-icon">✕</button>
    </div>
    <div id="drawer-post"></div>
    <div class="drawer-comments" id="drawer-comments"></div>
    <form id="comment-form" class="comment-form">
      <input type="text" id="comment-input" placeholder="Write a reply…" maxlength="1000">
      <button type="submit" class="btn btn-primary">Reply</button>
    </form>
  </div>
</div>

<div id="toast" class="toast hidden"></div>

<script src="app.js"></script>
</body>
</html>
